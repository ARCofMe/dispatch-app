version: "3.9"

services:
  dispatch-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_OPS_HUB_API_BASE: http://host.docker.internal:8787
        VITE_OPS_HUB_API_TOKEN: ${VITE_OPS_HUB_API_TOKEN}
        VITE_DISPATCHER_ID: ${VITE_DISPATCHER_ID}
        VITE_OPSHUB_URL: ${VITE_OPSHUB_URL}
        VITE_ROUTEDESK_URL: ${VITE_ROUTEDESK_URL}
        VITE_PARTSAPP_URL: ${VITE_PARTSAPP_URL}
        VITE_FIELDDESK_URL: ${VITE_FIELDDESK_URL}
    ports:
      - "4173:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
